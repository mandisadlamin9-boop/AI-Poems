<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="sparkle s1">❀</div>
      <div class="sparkle s2">♡</div>
      <div class="sparkle s3">✦</div>
      <div class="sparkle s4">❀</div>
      <div class="sparkle s5">✦</div>
      <div class="sparkle s6">♡</div>

      <main>
        <div class="hero">
          <span class="emoji">🧁</span>
          <h1>Recipe <em>Magic</em></h1>
          <p class="subtitle">
            Tell me what you're craving & I'll whip up a recipe just for you
          </p>
        </div>

        <form id="search-form" class="form-wrapper">
          <div class="input-group">
            <input
              type="text"
              id="search-form-input"
              placeholder="e.g. Strawberry cake, Sushi, Brownies..."
              required
              autocomplete="off"
            />
            <button type="submit" class="btn">Generate 🍰</button>
          </div>
          <p class="hint">Type any ingredient, dish, or cuisine ♡</p>
        </form>

        <div class="result-card hidden" id="result-card">
          <div class="result-label">~ Your Recipe ~</div>
          <div id="recipe-generator"></div>
        </div>
      </main>

      <footer>
        <p>
          Coded by
          <a href="https://github.com/" target="_blank"
            ><strong>Lihle</strong></a
          >
          , Open-sourced<a
            href="https://github.com/mandisadlamin9-boop/AI-Poems"
            target="_blank"
          >
            on GitHub</a
          >
          , Hosted<a
            href="https://app.netlify.com/projects/dancing-longma-7e694a/overview"
            target="_blank"
          >
            on Netlify</a
          >
        </p>
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
