<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

  <body>
    <div class="container">
      <h1>AI English Poems</h1>
      <div class="form-search">
        <header>
          <form class="search-form" id="search-form">
            <input
              type="search"
              placeholder="Enter the topic of a French poem.."
              required
              id="search-form-input"
              class="search-form-input"
            />
            <input type="submit" value="Search" class="search-form-button" />
          </form>
        </header>
      </div>
    </div>
    <div class="display-card" id="poem-generator">
      <span> </span>
    </div>
    <footer>
      <p>
        This project was coded by
        <a href="https://github.com/" target="_blank">Lihle</a>

        <a
          href="https://github.com/mandisadlamin9-boop/AI-Poems"
          target="_blank"
        >
          open-sourced on GitHub</a
        >
        and
        <a
          href="https://app.netlify.com/projects/dancing-longma-7e694a/overview"
          target="_blank"
        >
          hosted on Netlify</a
        >
      </p>
    </footer>

    <script src="src/index.js"></script>
